<?xml version="1.0" encoding="UTF-8"?>
<!--
  Play Store feature graphic (1024×500). Lo importas a Play Console como PNG;
  conviértelo con cualquier herramienta (Figma → export, ImageMagick:
    `magick public/feature-graphic.svg -resize 1024x500 public/feature-graphic.png`,
  o un convertidor online). Diseñado en la paleta de marca: navy + brand rose,
  con tipografía display y motivo de patitas.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500" role="img" aria-label="VuelveaCasa">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1827"/>
      <stop offset="60%" stop-color="#1a2640"/>
      <stop offset="100%" stop-color="#3a1d2e"/>
    </linearGradient>
    <radialGradient id="rose" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0%" stop-color="#b8264a" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#b8264a" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="cream" cx="0.05" cy="0.95" r="0.55">
      <stop offset="0%" stop-color="#f7f3ec" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#f7f3ec" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#rose)"/>
  <rect width="1024" height="500" fill="url(#cream)"/>

  <!-- Floating glow blobs -->
  <circle cx="900" cy="80" r="160" fill="#b8264a" fill-opacity="0.35" filter="url(#soft)"/>
  <circle cx="120" cy="430" r="200" fill="#fbe9ee" fill-opacity="0.08" filter="url(#soft)"/>

  <!-- Subtle dot grid -->
  <g fill="#ffffff" fill-opacity="0.05">
    <g transform="translate(60 60)">
      <circle cx="0" cy="0" r="1.5"/>
      <circle cx="32" cy="0" r="1.5"/>
      <circle cx="64" cy="0" r="1.5"/>
      <circle cx="0" cy="32" r="1.5"/>
      <circle cx="32" cy="32" r="1.5"/>
      <circle cx="0" cy="64" r="1.5"/>
    </g>
  </g>

  <!-- Logo mark (paw inside circle) -->
  <g transform="translate(72 196)">
    <circle r="42" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
    <g transform="translate(-22 -20)" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="#ffffff">
      <circle cx="6" cy="14" r="5"/>
      <circle cx="16" cy="6" r="5"/>
      <circle cx="28" cy="6" r="5"/>
      <circle cx="38" cy="14" r="5"/>
      <path d="M14 26 c4-7 12-9 16 0 c2 5 -1 12 -8 12 c-7 0 -10-7 -8-12 z" stroke="none"/>
    </g>
  </g>

  <!-- Brand wordmark -->
  <text x="142" y="218" font-family="Georgia, 'Times New Roman', serif" font-weight="600" font-size="44" fill="#ffffff" letter-spacing="-1.2">
    VuelveaCasa
  </text>

  <!-- Eyebrow -->
  <g transform="translate(72 256)">
    <rect width="296" height="34" rx="17" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.20"/>
    <circle cx="20" cy="17" r="4" fill="#b8264a"/>
    <text x="36" y="23" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ffffff" letter-spacing="2">
      RED COMUNITARIA · MÉXICO
    </text>
  </g>

  <!-- Headline -->
  <text x="72" y="330" font-family="Georgia, 'Times New Roman', serif" font-weight="600" font-size="52" fill="#ffffff" letter-spacing="-1.5">
    Reporta, encuentra
  </text>
  <text x="72" y="386" font-family="Georgia, 'Times New Roman', serif" font-weight="600" font-size="52" fill="#ffffff" letter-spacing="-1.5">
    y ayuda a que <tspan fill="#fbe9ee">vuelvan a casa</tspan>.
  </text>

  <!-- Pills -->
  <g transform="translate(72 416)" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#ffffff">
    <g>
      <rect width="148" height="32" rx="16" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.18"/>
      <circle cx="16" cy="16" r="3" fill="#b8264a"/>
      <text x="30" y="21">Alertas por zona</text>
    </g>
    <g transform="translate(160 0)">
      <rect width="172" height="32" rx="16" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.18"/>
      <circle cx="16" cy="16" r="3" fill="#b8264a"/>
      <text x="30" y="21">Aliados verificados</text>
    </g>
    <g transform="translate(344 0)">
      <rect width="174" height="32" rx="16" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.18"/>
      <circle cx="16" cy="16" r="3" fill="#b8264a"/>
      <text x="30" y="21">Donaciones rastreables</text>
    </g>
  </g>

  <!-- Right side decorative paw cluster -->
  <g transform="translate(720 130)" fill="#ffffff" opacity="0.85">
    <g transform="rotate(-12)">
      <g transform="translate(0 0) scale(2.6)">
        <circle cx="6" cy="14" r="5"/>
        <circle cx="16" cy="6" r="5"/>
        <circle cx="28" cy="6" r="5"/>
        <circle cx="38" cy="14" r="5"/>
        <path d="M14 26 c4-7 12-9 16 0 c2 5 -1 12 -8 12 c-7 0 -10-7 -8-12 z"/>
      </g>
    </g>
  </g>
  <g transform="translate(870 230)" fill="#fbe9ee" opacity="0.55">
    <g transform="rotate(18) scale(1.6)">
      <circle cx="6" cy="14" r="5"/>
      <circle cx="16" cy="6" r="5"/>
      <circle cx="28" cy="6" r="5"/>
      <circle cx="38" cy="14" r="5"/>
      <path d="M14 26 c4-7 12-9 16 0 c2 5 -1 12 -8 12 c-7 0 -10-7 -8-12 z"/>
    </g>
  </g>

  <!-- URL bottom right -->
  <text x="950" y="476" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.7" letter-spacing="0.5">
    vuelvecasa.com
  </text>
</svg>
